<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WALLIVE AR</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      #tap-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.92); color: #00E5CC;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: Arial, sans-serif; z-index: 999; cursor: pointer;
      }
      #tap-overlay h1 { font-size: 3em; letter-spacing: 4px; margin-bottom: 12px; font-family: Arial Black; }
      #tap-overlay p { font-size: 1em; color: #FFD600; margin-bottom: 6px; }
      #tap-overlay .sub { font-size: 0.85em; color: #aaa; }
      #screenshot-btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 888; display: none; background: rgba(0,0,0,0.6); border: 2px solid #00E5CC; border-radius: 50%; width: 72px; height: 72px; cursor: pointer; align-items: center; justify-content: center; flex-direction: column; gap: 4px; backdrop-filter: blur(4px); }
      #screenshot-btn svg { width: 28px; height: 28px; fill: #00E5CC; }
      #screenshot-btn span { font-size: 9px; color: #00E5CC; letter-spacing: 1px; text-transform: uppercase; font-family: Arial, sans-serif; }
      #flash { position: fixed; inset: 0; background: #fff; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.05s; }
      #flash.active { opacity: 1; }
      #toast { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); background: rgba(0,229,204,0.15); border: 1px solid #00E5CC; color: #00E5CC; font-family: Arial, sans-serif; font-size: 13px; letter-spacing: 1px; padding: 10px 20px; border-radius: 4px; z-index: 888; opacity: 0; transition: opacity 0.3s; white-space: nowrap; pointer-events: none; }
      #toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="flash"></div>
    <div id="toast"></div>
    <button id="screenshot-btn" onclick="takeScreenshot()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 15.2A3.2 3.2 0 1 0 12 8.8a3.2 3.2 0 0 0 0 6.4zm0-1.6a1.6 1.6 0 1 1 0-3.2 1.6 1.6 0 0 1 0 3.2z"/><path d="M9 3L7.17 5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3.17L15 3H9zm3 14a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
      <span>Save</span>
    </button>
    <div id="tap-overlay" onclick="startAR()">
      <h1>WALLIVE</h1>
      <p>👆 Tap to start AR</p>
      <div class="sub">Point at the world. See its story.</div>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./assets/targets/combined.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true; preserveDrawingBuffer: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video id="lajkonik-video"
          src="./assets/animations/lajkonik_silent.mp4"
          preload="auto" loop muted playsinline webkit-playsinline>
        </video>
        <video id="hejnal-video"
          src="./assets/animations/hejnal_silent.mp4"
          preload="auto" loop muted playsinline webkit-playsinline>
        </video>
        <video id="lady-video"
          src="./assets/animations/lady.mp4"
          preload="auto" loop muted playsinline webkit-playsinline>
        </video>
        <video id="copernicus-video"
          src="./assets/animations/copernicus.mp4"
          preload="auto" loop muted playsinline webkit-playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- TARGET 0: Лайконик -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#lajkonik-video" position="0 0.05 0.01" width="1.4" height="1.4"></a-video>
        <a-text value="LAJKONIK\nSymbol Krakowa od 1287 roku"
          align="center" color="#FFD600"
          position="0 -0.85 0.01" scale="0.42 0.42 0.42">
        </a-text>
        <a-text value="WALLIVE AR" align="center" color="#00E5CC"
          position="0 0.95 0.01" scale="0.28 0.28 0.28">
        </a-text>
      </a-entity>

      <!-- TARGET 1: Хейналиста -->
      <a-entity mindar-image-target="targetIndex: 1">
        <a-video src="#hejnal-video" position="0 0.05 0.01" width="1.6" height="1.6"></a-video>
        <a-text value="HEJNALISTA · 1241\nThe trumpeter who saved Krakow"
          align="center" color="#FFD600"
          position="0 -0.95 0.01" scale="0.38 0.38 0.38">
        </a-text>
        <a-text value="WALLIVE AR" align="center" color="#00E5CC"
          position="0 1.0 0.01" scale="0.25 0.25 0.25">
        </a-text>
      </a-entity>

      <!-- TARGET 2: Дама с горностаем -->
      <a-entity mindar-image-target="targetIndex: 2">
        <a-video src="#lady-video" position="0 0 0.01" width="1.0" height="1.3"></a-video>
        <a-text value="LADY WITH AN ERMINE\nLeonardo da Vinci · c.1489"
          align="center" color="#FFD600"
          position="0 -0.85 0.01" scale="0.38 0.38 0.38">
        </a-text>
        <a-text value="WALLIVE AR" align="center" color="#00E5CC"
          position="0 0.85 0.01" scale="0.25 0.25 0.25">
        </a-text>
      </a-entity>

      <!-- TARGET 3: Коперник -->
      <a-entity mindar-image-target="targetIndex: 3">
        <a-video src="#copernicus-video" position="0 0 0.01" width="1.2" height="1.0"></a-video>
        <a-text value="COPERNICUS · 1473-1543\nConversations with God"
          align="center" color="#FFD600"
          position="0 -0.75 0.01" scale="0.38 0.38 0.38">
        </a-text>
        <a-text value="WALLIVE AR" align="center" color="#00E5CC"
          position="0 0.75 0.01" scale="0.25 0.25 0.25">
        </a-text>
      </a-entity>

    </a-scene>

    <script>
      var videos = [
        document.getElementById('lajkonik-video'),
        document.getElementById('hejnal-video'),
        document.getElementById('lady-video'),
        document.getElementById('copernicus-video')
      ];

      var screenshotBtn = document.getElementById('screenshot-btn');

      function startAR() {
        document.getElementById('tap-overlay').style.display = 'none';
        videos.forEach(function(v) { v.play().catch(function(){}); });
      }

      function showToast(msg) {
        var toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 2500);
      }

      function flash() {
        var f = document.getElementById('flash');
        f.classList.add('active');
        setTimeout(function() { f.classList.remove('active'); }, 150);
      }

      function takeScreenshot() {
        flash();
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            var arCanvas = document.querySelector('canvas.a-canvas') || document.querySelector('canvas');
            var camVideo = document.querySelector('video[autoplay]') || document.querySelector('.a-canvas ~ video') || (function() {
              var vids = document.querySelectorAll('video');
              for (var i = 0; i < vids.length; i++) {
                if (vids[i].srcObject) return vids[i];
              }
              return null;
            })();

            if (!arCanvas) { showToast('Canvas not found'); return; }

            try {
              var w = arCanvas.width;
              var h = arCanvas.height;
              var offscreen = document.createElement('canvas');
              offscreen.width = w;
              offscreen.height = h;
              var ctx = offscreen.getContext('2d');

              // Рисуем камеру если нашли
              if (camVideo && camVideo.readyState >= 2) {
                ctx.drawImage(camVideo, 0, 0, w, h);
              } else {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, w, h);
              }

              // Поверх рисуем AR canvas
              ctx.drawImage(arCanvas, 0, 0, w, h);

              // Логотип WALLIVE внизу
              ctx.fillStyle = 'rgba(0,0,0,0.45)';
              ctx.fillRect(0, h - 48, w, 48);
              ctx.fillStyle = '#00E5CC';
              ctx.font = 'bold 22px Arial';
              ctx.textAlign = 'center';
              ctx.fillText('WALLIVE AR · wallive.app', w / 2, h - 16);

              var filename = 'wallive-ar-' + Date.now() + '.png';
              offscreen.toBlob(function(blob) {
                if (!blob || blob.size < 1000) { showToast('Try again'); return; }
                var file = new File([blob], filename, { type: 'image/png' });
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                  navigator.share({ files: [file], title: 'WALLIVE AR', text: 'See history come alive · wallive.app' }).catch(function() { downloadFallback(URL.createObjectURL(blob), filename); });
                } else { downloadFallback(URL.createObjectURL(blob), filename); }
              }, 'image/png');
            } catch(e) { showToast('Try again'); }
          });
        });
      }

      function downloadFallback(dataURL, filename) {
        var a = document.createElement('a');
        a.href = dataURL;
        a.download = filename;
        a.click();
        showToast('Saved!');
      }

      document.querySelectorAll('[mindar-image-target]').forEach(function(target, i) {
        target.addEventListener('targetFound', function() {
          videos[i].play().catch(function(){});
          screenshotBtn.style.display = 'flex';
        });
        target.addEventListener('targetLost', function() {
          videos[i].pause();
          screenshotBtn.style.display = 'none';
        });
      });
    </script>
  </body>
</html>
