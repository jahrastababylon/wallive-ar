<!DOCTYPE html>
<!--
  WALLIVE AR · Tiger Energy — Promo Video Experience
  ===================================================
  Назначение: AR опыт для банки Tiger Energy
  Механика: видео промо играет рядом с банкой, тап = звук
  Маркер: assets/targets/tiger.mind
  Видео: assets/animations/tiger-promo.mp4

  Автор: WALLIVE · wallive.app
  Последнее обновление: 2026-04
-->
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WALLIVE AR · Tiger Energy</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      #tap-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.92); color: #fff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: Arial, sans-serif; z-index: 999; cursor: pointer;
      }
      #tap-overlay h1 { font-size: 3em; letter-spacing: 4px; margin-bottom: 12px; font-family: Arial Black; }
      #tap-overlay p { font-size: 1em; color: #b44fff; margin-bottom: 6px; }
      #tap-overlay .sub { font-size: 0.85em; color: #aaa; }

      /* Кнопка звука */
      #sound-btn {
        position: fixed; top: 24px; right: 24px; z-index: 888;
        background: rgba(0,0,0,0.6); border: 2px solid #b44fff;
        border-radius: 50%; width: 56px; height: 56px;
        display: none; align-items: center; justify-content: center;
        cursor: pointer; font-size: 22px;
        backdrop-filter: blur(4px);
      }

      /* Подсказка */
      #hint {
        position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
        color: #fff; font-family: Arial Black, sans-serif; font-size: 13px;
        letter-spacing: 2px; text-transform: uppercase;
        background: rgba(180,79,255,0.3); border: 1px solid #b44fff;
        padding: 10px 20px; border-radius: 4px;
        display: none; pointer-events: none;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
  </head>
  <body>
    <div id="tap-overlay" onclick="startAR()">
      <h1>WALLIVE</h1>
      <p>🐯 Tiger Energy AR</p>
      <div class="sub">Tap to start · Point at the can</div>
    </div>

    <div id="hint">POINT AT THE CAN 🐯</div>

    <!-- Кнопка мьют/анмьют -->
    <div id="sound-btn" onclick="toggleSound()">🔇</div>

    <a-scene
      mindar-image="imageTargetSrc: ../assets/targets/tiger.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true; preserveDrawingBuffer: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <!--
          Видео Tiger Energy промо.
          muted=true по умолчанию — Safari требует muted для autoplay.
          Звук включается по тапу на кнопку sound-btn.
        -->
        <video id="tiger-video"
          src="../assets/animations/tiger-promo.mp4"
          preload="auto" loop muted playsinline webkit-playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- TARGET 0: Tiger Energy банка -->
      <a-entity id="tiger-target" mindar-image-target="targetIndex: 0">

        <!--
          Видео позиционировано СЛЕВА от банки.
          Банка примерно 1.0 x 2.2 units в AR пространстве.
          Видео: x=-1.2 (левее банки), width=1.4, height=1.8 (вертикальный формат).
          Если видео горизонтальное — поменяй width=2.0 height=1.1 и x=-1.6
        -->
        <a-video
          id="ar-video"
          src="#tiger-video"
          position="-1.3 0 0.01"
          width="1.2" height="1.8"
          visible="false"
        ></a-video>

        <!-- Брендинг WALLIVE -->
        <a-text value="WALLIVE AR" align="center" color="#b44fff"
          position="-1.3 1.1 0.01" scale="0.22 0.22 0.22"
          visible="false" id="brand-text">
        </a-text>

      </a-entity>
    </a-scene>

    <script>
      var arStarted     = false;
      var targetVisible = false;
      var isMuted       = true;
      var video         = document.getElementById("tiger-video");
      var arVideo       = document.getElementById("ar-video");
      var brandText     = document.getElementById("brand-text");
      var soundBtn      = document.getElementById("sound-btn");

      function startAR() {
        document.getElementById("tap-overlay").style.display = "none";
        arStarted = true;
        document.getElementById("hint").style.display = "block";
      }

      var tigerTarget = document.getElementById("tiger-target");

      tigerTarget.addEventListener("targetFound", function() {
        targetVisible = true;
        document.getElementById("hint").style.display = "none";

        // Показываем видео и бренд
        arVideo.setAttribute("visible", true);
        brandText.setAttribute("visible", true);
        soundBtn.style.display = "flex";

        // Запускаем видео (muted для autoplay на iOS)
        video.muted = true;
        video.play().catch(function(e) { console.log("Video play error:", e); });
      });

      tigerTarget.addEventListener("targetLost", function() {
        targetVisible = false;
        arVideo.setAttribute("visible", false);
        brandText.setAttribute("visible", false);
        soundBtn.style.display = "none";
        video.pause();
        // Сбрасываем звук
        video.muted = true;
        isMuted = true;
        soundBtn.textContent = "🔇";
        document.getElementById("hint").style.display = "block";
      });

      // Включить/выключить звук по тапу
      function toggleSound() {
        isMuted = !isMuted;
        video.muted = isMuted;
        soundBtn.textContent = isMuted ? "🔇" : "🔊";
        if (!isMuted) {
          // iOS требует явного play() после unmute
          video.play().catch(function() {});
        }
      }
    </script>
  </body>
</html>
