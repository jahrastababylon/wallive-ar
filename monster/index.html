<!DOCTYPE html>
<!--
  WALLIVE AR · Monster Energy Ultra — Particle Explosion Demo
  ============================================================
  Назначение: AR опыт для банки Monster Energy Ultra (белый кан)
  Технологии: MindAR.js 1.2.5 + A-Frame 1.4.2
  Маркер: assets/targets/monster.mind (3 фото банки скомпилированы вместе)
  
  Логика:
    1. Пользователь открывает страницу, тапает "Start AR"
    2. Наводит камеру на банку Monster
    3. Появляется подсказка "TAP THE CAN"
    4. Каждый тап → взрыв частиц из центра маркера
    5. Частицы: белые/серебряные/зелёные (цвета Monster Ultra)
    6. Fade out за PARTICLE_LIFETIME мс, затем удаляются из DOM
  
  Файлы:
    assets/targets/monster.mind  — скомпилированный маркер (3 ракурса банки)
    assets/targets/monster.jpg   — исходное фото банки (референс)
  
  Автор: WALLIVE · wallive.app
  Последнее обновление: 2026-04
-->
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WALLIVE AR · Monster Ultra</title>

    <!-- MindAR.js — image tracking без App Store, browser-based -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <!-- A-Frame — 3D/WebXR фреймворк -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- MindAR + A-Frame интеграция -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; background: #000; }

      /* Стартовый экран — скрывается после тапа */
      #tap-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.92); color: #00E5CC;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-family: Arial, sans-serif; z-index: 999; cursor: pointer;
      }
      #tap-overlay h1 { font-size: 3em; letter-spacing: 4px; margin-bottom: 12px; font-family: Arial Black; }
      #tap-overlay p { font-size: 1em; color: #b3ff00; margin-bottom: 6px; }
      #tap-overlay .sub { font-size: 0.85em; color: #aaa; }

      /* Подсказка — появляется когда маркер найден, мигает */
      #hint {
        position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
        color: #b3ff00; font-family: Arial, sans-serif; font-size: 14px;
        letter-spacing: 2px; text-transform: uppercase;
        background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 4px;
        display: none; pointer-events: none;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    </style>
  </head>
  <body>

    <!-- Стартовый экран -->
    <div id="tap-overlay" onclick="startAR()">
      <h1>WALLIVE</h1>
      <p>⚡ Monster Ultra AR</p>
      <div class="sub">Tap to start · Point at the can</div>
    </div>

    <!-- Подсказка поверх AR -->
    <div id="hint">TAP THE CAN ⚡</div>

    <!--
      A-Frame сцена
      preserveDrawingBuffer: true — нужно для скриншотов (canvas.toDataURL)
      autoStart: true — MindAR стартует сразу после тапа
    -->
    <a-scene
      mindar-image="imageTargetSrc: ../assets/targets/monster.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true; preserveDrawingBuffer: true;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- TARGET 0: Monster Ultra (индекс соответствует порядку компиляции в monster.mind) -->
      <a-entity id="monster-target" mindar-image-target="targetIndex: 0">

        <!--
          Невидимый plane поверх маркера — нужен для перехвата raycast тапов в A-Frame.
          Без него тапы на 3D объекты не определяются.
          width/height подобраны под пропорции банки Monster.
        -->
        <a-plane
          id="tap-plane"
          position="0 0 0.01"
          width="1.2" height="2.0"
          material="opacity: 0; transparent: true; side: double"
        ></a-plane>

        <!--
          Контейнер для частиц.
          Все a-sphere частицы создаются динамически внутри этого entity.
          position z=0.05 — чуть перед плоскостью маркера.
        -->
        <a-entity id="particles-container" position="0 0 0.05"></a-entity>

        <!-- Брендинг WALLIVE над банкой -->
        <a-text value="WALLIVE AR" align="center" color="#b3ff00"
          position="0 1.2 0.01" scale="0.28 0.28 0.28"></a-text>

      </a-entity>
    </a-scene>

    <script>
      // =============================================
      // НАСТРОЙКИ ЧАСТИЦ — легко кастомизировать
      // =============================================
      var PARTICLE_COUNT    = 80;      // кол-во частиц на один взрыв
      var PARTICLE_SPEED    = 0.018;   // базовая скорость разлёта
      var PARTICLE_LIFETIME = 1800;    // время жизни частицы в мс
      var PARTICLE_SIZE_MIN = 0.015;   // минимальный радиус сферы
      var PARTICLE_SIZE_MAX = 0.055;   // максимальный радиус сферы
      var GRAVITY           = -0.0003; // сила притяжения вниз
      var SPAWN_DELAY_MAX   = 80;      // макс. задержка спавна (ms) — даёт "рассыпанный" эффект

      // Цвета частиц — Monster Ultra palette (белый/серебро/зелёный)
      var COLORS = [
        '#ffffff', // белый
        '#e0e0e0', // светло-серый
        '#b3ff00', // Monster зелёный
        '#c8ff4d', // светло-зелёный
        '#d4ffb3', // мятный
        '#f0fff0'  // почти белый с зелёным
      ];
      // =============================================

      var arStarted       = false;
      var targetVisible   = false;
      var particlesContainer = null;

      // Скрываем стартовый экран и запускаем AR
      function startAR() {
        document.getElementById('tap-overlay').style.display = 'none';
        arStarted = true;
      }

      // Слушаем события маркера
      var monsterTarget = document.getElementById('monster-target');

      monsterTarget.addEventListener('targetFound', function() {
        targetVisible = true;
        document.getElementById('hint').style.display = 'block';
        particlesContainer = document.getElementById('particles-container');
      });

      monsterTarget.addEventListener('targetLost', function() {
        targetVisible = false;
        document.getElementById('hint').style.display = 'none';
      });

      // Тапы: touchstart для мобильных, click для десктопа
      document.addEventListener('touchstart', handleTap, { passive: true });
      document.addEventListener('click', handleTap);

      function handleTap(e) {
        // Игнорируем тапы пока AR не запущен или маркер не виден
        if (!arStarted || !targetVisible) return;
        explode();
      }

      // Создаём взрыв частиц
      function explode() {
        if (!particlesContainer) return;

        for (var i = 0; i < PARTICLE_COUNT; i++) {
          (function() {
            var particle = document.createElement('a-sphere');
            var size  = PARTICLE_SIZE_MIN + Math.random() * (PARTICLE_SIZE_MAX - PARTICLE_SIZE_MIN);
            var color = COLORS[Math.floor(Math.random() * COLORS.length)];

            // Случайное направление в сферических координатах → декартовы
            var theta = Math.random() * Math.PI * 2;
            var phi   = Math.random() * Math.PI;
            var speed = PARTICLE_SPEED * (0.5 + Math.random()); // разброс скоростей
            var vx = Math.sin(phi) * Math.cos(theta) * speed;
            var vy = Math.sin(phi) * Math.sin(theta) * speed + 0.008; // небольшой upward bias
            var vz = Math.cos(phi) * speed;

            particle.setAttribute('radius', size);
            particle.setAttribute('material', 'shader: flat; color: ' + color + '; opacity: 1');
            particle.setAttribute('position', '0 0 0');
            particlesContainer.appendChild(particle);

            var startTime = Date.now();
            var x = 0, y = 0, z = 0;
            var velY = vy; // копия vy для мутации

            function animate() {
              var elapsed = Date.now() - startTime;

              // Удаляем частицу по истечении времени жизни
              if (elapsed >= PARTICLE_LIFETIME) {
                if (particle.parentNode) particle.parentNode.removeChild(particle);
                return;
              }

              // Физика: позиция + гравитация
              x += vx;
              y += velY;
              z += vz;
              velY += GRAVITY;

              // Opacity: линейный fade out
              var opacity = 1 - (elapsed / PARTICLE_LIFETIME);

              particle.setAttribute('position', x + ' ' + y + ' ' + z);
              particle.setAttribute('material', 'shader: flat; color: ' + color + '; opacity: ' + opacity);

              requestAnimationFrame(animate);
            }

            // Небольшой случайный delay — эффект "рассыпания", не все сразу
            setTimeout(function() {
              requestAnimationFrame(animate);
            }, Math.random() * SPAWN_DELAY_MAX);

          })();
        }
      }
    </script>
  </body>
</html>
